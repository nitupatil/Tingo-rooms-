 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User - TingoRooms</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "86e4ee86-6134-42b0-ad76-4997d7ce02de",
    });
  });
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

<style>
:root {
  --primary: #4F46E5;
  --primary-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
  --primary-light: #EEF2FF;
  --primary-glow: rgba(79, 70, 229, 0.3);
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --text-main: #0F172A;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --radius: 28px;
  --safe-bottom: 90px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background-color: #E2E8F0; /* Desktop bg */
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
  height: 100vh;
  overflow: hidden; /* Ensure desktop body does not scroll */
}

/* MOBILE APP WRAPPER */
.app-container {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  height: 100vh;
  overflow-y: auto; /* Internal scrolling for sticky elements to work */
  overflow-x: hidden;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

@media (min-width: 900px) {
  .app-container {
    max-width: none;
    width: 100%;
    margin: 0;
    padding-right: 148px;
    min-height: 100vh;
    box-shadow: none;
    border-radius: 0;
  }

  .main-content { max-width: calc(100% - 148px); margin: 0; }
  .header { max-width: calc(100% - 148px); margin: 0; }
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  background: rgba(248, 250, 252, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(0,0,0,0.03);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
  font-weight: 700;
  font-size: 18px;
  color: var(--text-main);
}

/* MAIN CONTENT */
.main-content {
  padding: 20px 20px calc(var(--safe-bottom) + 20px) 20px;
  flex: 1;
}

.card {
  background: var(--surface);
  padding: 24px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01);
  border: 1px solid rgba(0,0,0,0.02);
}

.card h3 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  text-align: center;
  color: var(--text-main);
}

/* FORMS */
.input-group {
  margin-bottom: 16px;
  position: relative;
}

.input-group span {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
  font-size: 20px;
  transition: color 0.3s;
}

.input-group:focus-within span {
  color: var(--primary);
}

input, select {
  width: 100%;
  padding: 14px 16px 14px 44px; /* Space for icon */
  border-radius: 16px;
  border: 1px solid transparent;
  background: #F1F5F9;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text-main);
  appearance: none;
}

input::placeholder, select:invalid {
  color: #94A3B8;
}

input:focus, select:focus {
  border-color: #A5B4FC;
  background: var(--surface);
  box-shadow: 0 0 0 4px var(--primary-light);
}

button {
  width: 100%;
  padding: 16px;
  background: var(--primary-gradient);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
  margin-top: 8px;
  box-shadow: 0 4px 12px var(--primary-glow);
}

button:active {
  transform: scale(0.96);
}

.link-text {
  color: var(--primary);
  text-align: center;
  margin-top: 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}

.timer {
  text-align: center;
  color: #EF4444; /* Red color */
  margin: 16px 0;
  font-weight: 700;
  font-size: 20px;
  font-variant-numeric: tabular-nums;
  background: #FEF2F2;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #FEE2E2;
}

.hidden { 
  display: none !important; 
}

/* PROFILE SPECIFIC */
.profile-card {
  text-align: center;
}

.avatar-wrapper {
  position: relative;
  width: 110px;
  height: 110px;
  margin: 0 auto 20px auto;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--surface);
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
}

.profile-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text-main);
}

.profile-email {
  color: var(--text-muted);
  font-size: 15px;
  margin-bottom: 32px;
  font-weight: 500;
}

.logout-btn {
  background: #FEF2F2;
  color: #EF4444;
  box-shadow: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid #FEE2E2;
}

.logout-btn:active {
  background: #FEE2E2;
}

/* BOTTOM NAV */
@media (max-width: 899px) {
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    padding: 12px 10px 24px 10px; 
    box-shadow: 0 -10px 25px rgba(0,0,0,0.04);
    border-top: 1px solid rgba(0,0,0,0.03);
    z-index: 1000;
  }
}

@media (min-width: 900px) {
  .bottom-nav {
    position: fixed;
    top: 120px;
    right: 24px;
    bottom: 24px;
    left: auto;
    width: 96px;
    max-width: 96px;
    padding: 16px 8px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(226, 232, 240, 0.7);
    z-index: 1200;
  }

  .nav-item { width: 100%; justify-content: center; padding: 10px 0; }
  .nav-item .icon-wrapper { padding: 10px; }
  .nav-item .material-symbols-rounded { font-size: 24px; }
  .nav-item span { font-size: 10px; margin-top: 6px; }
  .nav-item.post-btn { width: 100%; margin-top: 6px; }
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #94A3B8;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
  transition: all 0.3s;
  position: relative;
}

.nav-item.active {
  color: var(--primary);
}

.nav-item .icon-wrapper {
  position: relative;
  padding: 4px 12px;
  border-radius: 16px;
  transition: all 0.3s;
}

.nav-item.active .icon-wrapper {
  background: var(--primary-light);
}

.nav-item .material-symbols-rounded {
  font-size: 26px;
}

.nav-item.post-btn .material-symbols-rounded {
  background: var(--primary-gradient);
  color: white;
  padding: 12px;
  border-radius: 50%;
  margin-top: -30px; 
  box-shadow: 0 8px 20px var(--primary-glow);
  font-size: 28px;
  border: 4px solid var(--bg);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.nav-item.post-btn:active .material-symbols-rounded {
  transform: scale(0.9);
}

.nav-item.post-btn span {
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="app-container">

  <div class="header" id="pageTitle">My Account</div>

  <div class="main-content">

    <div id="loginBox" class="card">
      <h3>Welcome Back</h3>
      
      <div class="input-group">
        <span class="material-symbols-rounded">mail</span>
        <input id="loginEmail" placeholder="Email Address">
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">lock</span>
        <input id="loginPassword" type="password" placeholder="Password">
      </div>
      
      <button onclick="login()">Login</button>
      <div onclick="showSignup()" class="link-text">Don't have an account? Sign Up</div>
    </div>

    <div id="signupBox" class="card hidden">
      <h3>Create Account</h3>
      
      <div class="input-group">
        <span class="material-symbols-rounded">person</span>
        <input id="name" placeholder="Full Name">
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">mail</span>
        <input id="email" placeholder="Email Address">
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">call</span>
        <input id="mobile" placeholder="Mobile Number">
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">wc</span>
        <select id="gender">
          <option value="" disabled selected>Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">image</span>
        <input id="avatar" placeholder="Avatar URL (Optional)">
      </div>
      <div class="input-group">
        <span class="material-symbols-rounded">lock</span>
        <input id="password" type="password" placeholder="Create Password">
      </div>
      
      <button onclick="signup()">Send OTP</button>
      <div onclick="showLogin()" class="link-text">Already have an account? Login</div>
    </div>

    <div id="otpBox" class="card hidden">
      <h3>Verify OTP</h3>
      <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
        We've sent a 6-digit code to your email.
      </p>

      <div class="input-group">
        <span class="material-symbols-rounded">pin</span>
        <input id="otpInput" type="number" placeholder="Enter OTP">
      </div>

      <div class="timer" id="timer">05:00</div>

      <button onclick="verifyOTP()">Verify & Complete</button>
      <div class="link-text" onclick="resendOTP()">Resend OTP</div>
    </div>

    <div id="profileBox" class="card hidden profile-card">
      <div class="avatar-wrapper">
        <img id="profileAvatar" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
      </div>
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-email" id="profileEmail"></div>
      
      <button class="logout-btn" onclick="logout()">
        <span class="material-symbols-rounded" style="font-size: 20px;">logout</span>
        Logout
      </button>
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="go('index.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">home</span></div>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="checkLoginNav('chat.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">chat_bubble</span></div>
      <span>Chat</span>
    </div>
    <div class="nav-item post-btn" onclick="checkLoginNav('postroom.html')">
      <span class="material-symbols-rounded">add</span>
      <span>Post</span>
    </div>
    <div class="nav-item" onclick="go('map.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">map</span></div>
      <span>Map</span>
    </div>
    <div class="nav-item active" onclick="go('user.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">person</span></div>
      <span>Profile</span>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://slhbrakvprrxtqzodcyy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaGJyYWt2cHJyeHRxem9kY3l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4NzksImV4cCI6MjA5MTUxNTg3OX0.zygNCH4m_Zoz0ybgoyhlQKySHkV_uuFHAEhzqG5WRZ0"; 

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentEmail = "";
let timerInterval;

/* INIT */
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (user) showProfile(user);
};

/* ONESIGNAL REGISTRATION LOGIC */
async function saveOneSignalId(user) {
  return new Promise((resolve) => {
    const OneSignal = window.OneSignalDeferred || window.OneSignal || [];
    OneSignal.push(async function(OneSignal) {
      try {
        const playerId = await OneSignal.getUserId();
        if (playerId) {
          // Using your existing Supabase client is safer than a raw fetch
          await db.from("users")
            .update({ onesignal_id: playerId })
            .eq("id", user.id);
        }
      } catch (err) {
        console.error("OneSignal Error:", err);
      }
      resolve();
    });
    
    // Safety fallback: resolve after 2 seconds in case OneSignal is blocked by an adblocker
    setTimeout(resolve, 2000); 
  });
}

/* UI SWITCHES */
function showSignup() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("signupBox").classList.remove("hidden");
  document.getElementById("pageTitle").innerText = "Sign Up";
}

function showLogin() {
  document.getElementById("signupBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("pageTitle").innerText = "My Account";
}

/* TIMER */
function startTimer() {
  let time = 300;
  const timerElement = document.getElementById("timer");

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;

    timerElement.innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

    time--;

    if (time < 0) {
      clearInterval(timerInterval);
      timerElement.innerText = "Expired";
    }
  }, 1000);
}

/* SEND OTP */
async function sendOTP(email, otp) {
  const { data } = await db.from("app_config").select("email_api_url").single();

  await fetch(data.email_api_url, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "otp",
      email: email,
      otp: otp
    })
  });
}

/* SIGNUP */
async function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const mobile = document.getElementById("mobile").value;
  const gender = document.getElementById("gender").value;
  const avatar = document.getElementById("avatar").value;
  const password = document.getElementById("password").value;

  if(!email || !password || !name) {
      alert("Name, Email, and Password are required.");
      return;
  }

  const { data: existing } = await db
    .from("users")
    .select("*")
    .eq("email", email);

  const otp = Math.floor(100000 + Math.random() * 900000);
  const expiry = new Date(Date.now() + 5 * 60000).toISOString();

  currentEmail = email;

  if (existing && existing.length > 0) {
    const user = existing[0];

    if (user.is_verified) {
      alert("User already exists. Please login.");
      return;
    }

    await db.from("users")
      .update({ otp: otp.toString(), otp_expiry: expiry, name, mobile_no: mobile, gender, avatar_url: avatar, password })
      .eq("email", email);

    await sendOTP(email, otp);

    alert("User already registered but not verified. OTP resent.");

  } else {
    await db.from("users").insert({
      name: name,
      email: email,
      mobile_no: mobile,
      gender: gender,
      avatar_url: avatar,
      password: password,
      otp: otp.toString(),
      otp_expiry: expiry,
      is_verified: false
    });

    await sendOTP(email, otp);

    alert("OTP sent to your email.");
  }

  document.getElementById("signupBox").classList.add("hidden");
  document.getElementById("otpBox").classList.remove("hidden");
  document.getElementById("pageTitle").innerText = "Verification";

  startTimer();
}

/* RESEND OTP */
async function resendOTP() {
  if(!currentEmail) return;

  const otp = Math.floor(100000 + Math.random() * 900000);
  const expiry = new Date(Date.now() + 5 * 60000).toISOString();

  await db.from("users")
    .update({ otp: otp.toString(), otp_expiry: expiry })
    .eq("email", currentEmail);

  await sendOTP(currentEmail, otp);

  alert("OTP resent");

  startTimer();
}

/* VERIFY OTP */
async function verifyOTP() {
  const otp = document.getElementById("otpInput").value;

  const { data } = await db
    .from("users")
    .select("*")
    .eq("email", currentEmail)
    .eq("otp", otp)
    .gt("otp_expiry", new Date().toISOString()); 

  if (!data || data.length === 0) {
    alert("Invalid or expired OTP");
    return;
  }

  const user = data[0];

  await db.from("users")
    .update({ is_verified: true, otp: null })
    .eq("email", currentEmail);

  user.is_verified = true;
  localStorage.setItem("user", JSON.stringify(user));

  // Wait for OneSignal ID to be captured and saved before redirecting
  await saveOneSignalId(user);

  alert("Account created & logged in!");
  handleRedirect();
}

/* LOGIN */
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const { data } = await db
    .from("users")
    .select("*")
    .eq("email", email)
    .eq("password", password)
    .eq("is_verified", true);

  if (!data || data.length === 0) {
    alert("Invalid credentials or account not verified.");
    return;
  }

  const user = data[0];
  localStorage.setItem("user", JSON.stringify(user));
  
  // Wait for OneSignal ID to be captured and saved before redirecting
  await saveOneSignalId(user);

  handleRedirect();
}

function handleRedirect() {
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get("redirect");
  if (redirect) {
    if (redirect === "chat") {
      const chatRedirect = JSON.parse(localStorage.getItem("chat_redirect"));
      if (chatRedirect) {
        window.location.href = `chat.html?room=${chatRedirect.roomId}&user=${chatRedirect.ownerId}&source=index`;
      } else {
        window.location.href = "chat.html";
      }
    } else if (redirect === "chatlist") {
      window.location.href = "chat.html";
    } else {
      window.location.href = redirect;
    }
  } else {
    window.location.href = "index.html";
  }
}

/* PROFILE */
function showProfile(user) {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("profileBox").classList.remove("hidden");
  document.getElementById("pageTitle").innerText = "My Profile";

  document.getElementById("profileName").innerText = user.name || "User";
  document.getElementById("profileEmail").innerText = user.email;

  function getDefaultAvatar(gender) {
    const m = 'https://i.ibb.co/wZVNcCDt/maleavt.png';
    const f = 'https://i.ibb.co/SXCj3b1q/femaleavt.png';
    if (!gender) return m;
    const g = String(gender).toLowerCase();
    if (g.includes('f')) return f;
    return m;
  }

  if (user.avatar_url && user.avatar_url.trim() !== "") {
    document.getElementById("profileAvatar").src = user.avatar_url;
  } else {
    document.getElementById("profileAvatar").src = getDefaultAvatar(user.gender);
  }
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

/* NAVIGATION (Bottom Nav) */
function go(page) {
  const isHome = page.endsWith('index.html') || page === 'index.html' || page === 'index';
  if (isHome) {
    if (window.self !== window.top) {
      try {
        if (parent && typeof parent.closePanel === 'function') {
          parent.closePanel();
          if (parent.location && !parent.location.pathname.endsWith('index.html')) {
            parent.location.href = 'index.html';
          }
          return;
        }
      } catch (e) {}
    }
    window.location.href = page;
    return;
  }

  if (window.self !== window.top) {
    try {
      if (parent && typeof parent.openPanel === 'function' && parent.innerWidth >= 900) {
        parent.openPanel(page);
        return;
      }
    } catch (e) {}
  }
  window.location.href = page;
}

function checkLoginNav(page) {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) {
    alert("Please login first to access this feature.");
  } else {
    window.location.href = page;
  }
}
</script>

</body>
</html>
