<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Room - TingoRooms</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

<style>
:root {
  --primary: #4F46E5;
  --primary-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
  --primary-light: #EEF2FF;
  --primary-glow: rgba(79, 70, 229, 0.3);
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --text-main: #0F172A;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --radius: 28px;
  --safe-bottom: 90px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background-color: #E2E8F0;
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
  height: 100vh;
  overflow: hidden;
}

/* MOBILE APP WRAPPER */
.app-container {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

@media (min-width: 900px) {
  .app-container {
    max-width: none;
    width: 100%;
    margin: 0;
    padding-right: 148px;
    min-height: 100vh;
    box-shadow: none;
    border-radius: 0;
  }

  .main-content { max-width: calc(100% - 148px); margin: 0; }
  .header { max-width: calc(100% - 148px); margin: 0; }
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  background: rgba(248, 250, 252, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 2000;
  border-bottom: 1px solid rgba(0,0,0,0.03);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
}

.header-title { 
  font-weight: 700; 
  font-size: 18px; 
  color: var(--text-main);
  flex: 1; 
  text-align: center; 
}

.back-btn {
  position: absolute;
  left: 16px;
  cursor: pointer;
  padding: 8px;
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.2s;
}

.back-btn:active {
  background: var(--border);
}

/* MAIN CONTENT */
.main-content {
  padding: 20px 20px calc(var(--safe-bottom) + 20px) 20px;
  flex: 1;
}

/* DASHBOARD STICKY HEADER */
.sticky-dash-header {
  position: sticky;
  top: -20px;
  background: var(--bg);
  z-index: 100;
  padding-top: 20px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  margin-top: -20px;
}

/* CARDS */
.card {
  background: var(--surface);
  padding: 24px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01);
  border: 1px solid rgba(0,0,0,0.02);
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .material-symbols-rounded {
  color: var(--primary);
}

/* FORMS & INPUTS */
.input-group {
  margin-bottom: 16px;
  position: relative;
}

.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-muted);
  padding-left: 4px;
}

.input-group > span.icon-left {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
  font-size: 20px;
  transition: color 0.3s;
  pointer-events: none;
}

.input-group label ~ span.icon-left {
  top: calc(50% + 10px); /* Adjust for label height */
}

.input-group:focus-within > span.icon-left {
  color: var(--primary);
}

input, select, textarea {
  width: 100%;
  padding: 14px 16px 14px 44px; /* Space for icon */
  border-radius: 16px;
  border: 1px solid transparent;
  background: #F1F5F9;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text-main);
  appearance: none;
}

/* Specific styling for fields without icons or different layouts */
input[type="file"] { padding-left: 16px; background: var(--surface); border: 1px dashed var(--text-muted); }
select#show_contact, select#show_whatsapp { padding-left: 16px; }

input::placeholder, select:invalid, textarea::placeholder {
  color: #94A3B8;
}

input:focus, select:focus, textarea:focus {
  border-color: #A5B4FC;
  background: var(--surface);
  box-shadow: 0 0 0 4px var(--primary-light);
}

textarea { 
  resize: vertical; 
  min-height: 100px; 
  padding-left: 16px; /* No icon for textarea usually */
}

/* BUTTONS */
button.primary-btn {
  width: 100%;
  padding: 16px;
  background: var(--primary-gradient);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 12px var(--primary-glow);
}

button.primary-btn:active { transform: scale(0.96); }
button.primary-btn:disabled { background: #94A3B8; box-shadow: none; cursor: not-allowed; transform: none; }

button.secondary-btn {
  width: 100%; 
  padding: 14px; 
  background: var(--primary-light); 
  color: var(--primary);
  border: none; 
  border-radius: 16px; 
  font-size: 15px; 
  font-weight: 600; 
  cursor: pointer;
  margin-bottom: 16px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 6px;
  transition: background 0.2s;
}

button.secondary-btn:active { background: #E0E7FF; }

hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.hidden { display: none !important; }

/* LOCATION SUGGESTIONS */
.autocomplete-wrapper { position: relative; }
.suggestions-box {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white;
  border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  z-index: 3000; max-height: 200px; overflow-y: auto; overflow-x: hidden;
}
.suggestion-item { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #F1F5F9; cursor: pointer; color: var(--text-main); }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:active { background: var(--primary-light); }

#map { height: 220px; border-radius: 16px; z-index: 10; margin-bottom: 16px; border: 1px solid var(--border); }

/* DASHBOARD LIST ITEMS */
.my-post-item {
  display: flex; padding: 16px; border: 1px solid var(--border); border-radius: 20px; margin-bottom: 12px;
  align-items: center; cursor: pointer; transition: background 0.2s, transform 0.2s; background: var(--surface);
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
}
.my-post-item:active { transform: scale(0.98); background: #F8FAFC; }
.my-post-item img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; margin-right: 16px; }
.my-post-info { flex: 1; }
.my-post-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; color: var(--text-main); }
.my-post-status { font-size: 11px; padding: 4px 10px; border-radius: 99px; display: inline-block; font-weight: 700; letter-spacing: 0.5px; }
.status-new { background: #FEF3C7; color: #D97706; }
.status-approved { background: #D1FAE5; color: #059669; }
.status-rejected { background: #FEE2E2; color: #DC2626; }
.edit-icon { color: #94A3B8; font-size: 24px; transition: color 0.2s; }
.my-post-item:hover .edit-icon { color: var(--primary); }

/* BOTTOM NAV */
@media (max-width: 899px) {
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    padding: 12px 10px 24px 10px; 
    box-shadow: 0 -10px 25px rgba(0,0,0,0.04);
    border-top: 1px solid rgba(0,0,0,0.03);
    z-index: 1000;
  }
}

@media (min-width: 900px) {
  .bottom-nav {
    position: fixed;
    top: 120px;
    right: 24px;
    bottom: 24px;
    left: auto;
    width: 96px;
    max-width: 96px;
    padding: 16px 8px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(226, 232, 240, 0.7);
    z-index: 1200;
  }

  .nav-item { width: 100%; justify-content: center; padding: 10px 0; }
  .nav-item .icon-wrapper { padding: 10px; }
  .nav-item .material-symbols-rounded { font-size: 24px; }
  .nav-item span { font-size: 10px; margin-top: 6px; }
  .nav-item.post-btn { width: 100%; margin-top: 6px; }
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #94A3B8;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
  transition: all 0.3s;
  position: relative;
}

.nav-item.active {
  color: var(--primary);
}

.nav-item .icon-wrapper {
  position: relative;
  padding: 4px 12px;
  border-radius: 16px;
  transition: all 0.3s;
}

.nav-item.active .icon-wrapper {
  background: var(--primary-light);
}

.nav-item .material-symbols-rounded {
  font-size: 26px;
}

.nav-item.post-btn .material-symbols-rounded {
  background: var(--primary-gradient);
  color: white;
  padding: 12px;
  border-radius: 50%;
  margin-top: -30px; 
  box-shadow: 0 8px 20px var(--primary-glow);
  font-size: 28px;
  border: 4px solid var(--bg);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.nav-item.post-btn:active .material-symbols-rounded {
  transform: scale(0.9);
}

.nav-item.post-btn span {
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="app-container">

  <div class="header">
    <div class="back-btn hidden" id="backToDashBtn" onclick="showDashboard()">
      <span class="material-symbols-rounded">arrow_back</span>
    </div>
    <div class="header-title" id="pageTitle">My Properties</div>
  </div>

  <div class="main-content">

    <div id="dashboardView" class="hidden">
      
      <div class="sticky-dash-header">
        <button class="primary-btn" onclick="showForm()" style="margin-bottom: 16px;">
          <span class="material-symbols-rounded">add_circle</span> Create New Post
        </button>
        
        <div class="input-group" style="margin-bottom: 0;">
          <span class="material-symbols-rounded icon-left">search</span>
          <input type="text" id="dashSearch" placeholder="Search my properties..." oninput="filterDashboard()">
        </div>
      </div>

      <div id="myPostsList">
        <p style="text-align:center; color:#94A3B8; font-size: 14px; margin-top:30px; font-weight: 500;">Loading your posts...</p>
      </div>
    </div>

    <div id="formView" class="hidden">
      <div class="card">
        <div class="section-title"><span class="material-symbols-rounded">real_estate_agent</span> Property Details</div>
        
        <div class="input-group">
          <span class="material-symbols-rounded icon-left">title</span>
          <input id="title" placeholder="Catchy Title (e.g. Spacious 1BHK)">
        </div>

        <div class="input-group">
          <span class="material-symbols-rounded icon-left">category</span>
          <select id="type">
            <option value="" disabled selected>Select Property Type</option>
            <option>1BHK</option>
            <option>2BHK</option>
            <option>1RK</option>
            <option>PG</option>
            <option>Other</option>
          </select>
        </div>

        <div style="display: flex; gap: 12px;">
          <div class="input-group" style="flex: 1;">
            <span class="material-symbols-rounded icon-left">payments</span>
            <input id="rent" type="number" placeholder="Rent (₹)">
          </div>
          <div class="input-group" style="flex: 1;">
            <span class="material-symbols-rounded icon-left">account_balance_wallet</span>
            <input id="deposit" type="number" placeholder="Deposit (₹)">
          </div>
        </div>

        <div class="input-group">
          <textarea id="description" placeholder="Describe the property, amenities, restrictions..."></textarea>
        </div>

        <div class="input-group">
          <label>Upload Images <span style="color:var(--text-muted); font-weight:400; font-size:11px;">(Leave blank to keep existing)</span></label>
          <input type="file" id="images" multiple accept="image/*">
        </div>
      </div>

      <div class="card">
        <div class="section-title"><span class="material-symbols-rounded">location_on</span> Location</div>
        
        <div class="input-group autocomplete-wrapper">
          <span class="material-symbols-rounded icon-left">search</span>
          <input id="loc" placeholder="Search address or pin on map..." autocomplete="off">
          <div id="locSuggestions" class="suggestions-box hidden"></div>
        </div>

        <button class="secondary-btn" onclick="detectLocation()">
          <span class="material-symbols-rounded" style="font-size: 20px;">my_location</span> Use Current GPS Location
        </button>

        <div id="map"></div>
      </div>

      <div class="card">
        <div class="section-title"><span class="material-symbols-rounded">support_agent</span> Contact & Brokerage</div>
        
        <div class="input-group">
          <span class="material-symbols-rounded icon-left">call</span>
          <input id="contact" type="tel" placeholder="Contact Number">
        </div>

        <div class="input-group" style="display: flex; align-items: center; justify-content: space-between; padding: 0 4px;">
          <label style="margin:0;">Show Contact to Public?</label>
          <select id="show_contact" style="width: 100px; padding: 10px 16px; border-radius: 12px;">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>

        <hr>

        <div class="input-group">
          <span class="material-symbols-rounded icon-left">forum</span>
          <input id="whatsapp" type="tel" placeholder="WhatsApp Number">
        </div>

        <div class="input-group" style="display: flex; align-items: center; justify-content: space-between; padding: 0 4px;">
          <label style="margin:0;">Show WhatsApp?</label>
          <select id="show_whatsapp" style="width: 100px; padding: 10px 16px; border-radius: 12px;">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>

        <hr>

        <div class="input-group">
          <label>Brokerage Details</label>
          <span class="material-symbols-rounded icon-left">handshake</span>
          <select id="brokerage_type" onchange="toggleBrokerage()">
            <option>No Brokerage</option>
            <option>Applicable</option>
            <option>Negotiable</option>
          </select>
        </div>

        <div class="input-group hidden" id="brokerageAmtWrapper">
          <span class="material-symbols-rounded icon-left">currency_rupee</span>
          <input id="brokerage_amount" type="number" placeholder="Enter Brokerage Amount">
        </div>
      </div>

      <button id="submitBtn" class="primary-btn" onclick="submitPost()">Submit Property</button>
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="go('index.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">home</span></div>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="go('chat.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">chat_bubble</span></div>
      <span>Chat</span>
    </div>
    <div class="nav-item active post-btn" onclick="go('postroom.html')">
      <span class="material-symbols-rounded">add</span>
      <span>Post</span>
    </div>
    <div class="nav-item" onclick="go('map.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">map</span></div>
      <span>Map</span>
    </div>
    <div class="nav-item" onclick="go('user.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">person</span></div>
      <span>Profile</span>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://slhbrakvprrxtqzodcyy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaGJyYWt2cHJyeHRxem9kY3l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4NzksImV4cCI6MjA5MTUxNTg3OX0.zygNCH4m_Zoz0ybgoyhlQKySHkV_uuFHAEhzqG5WRZ0";
const IMGBB_API_KEY = "5319b763af6273a0680f66766badf96a";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const currentUser = JSON.parse(localStorage.getItem("user"));

// Elements
const dashView = document.getElementById("dashboardView");
const formView = document.getElementById("formView");
const backBtn = document.getElementById("backToDashBtn");
const pageTitle = document.getElementById("pageTitle");
const locInput = document.getElementById("loc");
const suggestionsBox = document.getElementById("locSuggestions");
const submitBtn = document.getElementById("submitBtn");

let lat = null;
let lng = null;
let map;
let marker;

// State Variables
let myPostsData = [];
let currentEditingPostId = null; 
let currentEditingImages = ""; 

/* ---------------- INITIALIZATION ---------------- */
window.onload = () => {
  if (currentUser) {
    showDashboard();
  } else {
    window.location.href = "user.html?redirect=postroom.html";
  }
};

/* ---------------- VIEW ROUTING ---------------- */
function showDashboard() {
  formView.classList.add("hidden");
  dashView.classList.remove("hidden");
  backBtn.classList.add("hidden");
  pageTitle.innerText = "My Properties";
  fetchMyPosts();
}

function showForm(canGoBack = true, isEdit = false) {
  dashView.classList.add("hidden");
  formView.classList.remove("hidden");
  
  if(canGoBack && currentUser) {
    backBtn.classList.remove("hidden");
  }

  if (!isEdit) {
    clearForm();
  }

  if (!map) {
    initMap();
  } else {
    setTimeout(() => { 
      map.invalidateSize(); 
      if(lat && lng) {
        setMarker(lat, lng);
        map.setView([lat, lng], 15);
      }
    }, 200);
  }
}

function go(page) {
  const isHome = page.endsWith('index.html') || page === 'index.html' || page === 'index';
  if (isHome) {
    if (window.self !== window.top) {
      try {
        if (parent && typeof parent.closePanel === 'function') {
          parent.closePanel();
          if (parent.location && !parent.location.pathname.endsWith('index.html')) {
            parent.location.href = 'index.html';
          }
          return;
        }
      } catch (e) {}
    }
    window.location.href = page;
    return;
  }

  if (window.self !== window.top) {
    try {
      if (parent && typeof parent.openPanel === 'function' && parent.innerWidth >= 900) {
        parent.openPanel(page);
        return;
      }
    } catch (e) {}
  }
  window.location.href = page;
}

/* ---------------- DASHBOARD DATA & SEARCH ---------------- */
async function fetchMyPosts() {
  if (!currentUser) return;
  const listContainer = document.getElementById("myPostsList");
  
  const { data, error } = await db.from("room_posts")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  if (error) { listContainer.innerHTML = "<p style='text-align:center; color:#EF4444;'>Error loading posts.</p>"; return; }
  
  myPostsData = data; 
  renderDashboardList(myPostsData);
}

function renderDashboardList(posts) {
  const listContainer = document.getElementById("myPostsList");

  if (posts.length === 0) {
    listContainer.innerHTML = `
      <div style="text-align:center; padding: 40px 20px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius); border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);">
        <div style="width: 80px; height: 80px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
          <span class="material-symbols-rounded" style="font-size: 40px; color: var(--primary);">home_work</span>
        </div>
        <h3 style="color: var(--text-main); font-size: 18px; margin-bottom: 8px;">No properties yet</h3>
        <p style="font-size: 14px;">Tap 'Create New Post' to list your first property.</p>
      </div>`;
    return;
  }

  listContainer.innerHTML = "";
  posts.forEach(room => {
    let img = "https://via.placeholder.com/100x100?text=No+Img";
    if (room.images && room.images.length > 0) img = room.images.split(",")[0];
    
    let statusClass = "status-" + (room.status || "new").toLowerCase();
    
    listContainer.innerHTML += `
      <div class="my-post-item" onclick="editPost('${room.id}')">
        <img src="${img}" alt="Room">
        <div class="my-post-info">
          <div class="my-post-title">${room.title}</div>
          <div style="font-size: 14px; color: #64748B; margin-bottom: 8px; font-weight: 500;">₹ ${room.rent} | ${room.type}</div>
          <div class="my-post-status ${statusClass}">${(room.status || "NEW").toUpperCase()}</div>
        </div>
        <span class="material-symbols-rounded edit-icon">edit_square</span>
      </div>
    `;
  });
}

function filterDashboard() {
  const query = document.getElementById("dashSearch").value.toLowerCase();
  const filtered = myPostsData.filter(post => 
    (post.title && post.title.toLowerCase().includes(query)) ||
    (post.location && post.location.toLowerCase().includes(query)) ||
    (post.type && post.type.toLowerCase().includes(query))
  );
  renderDashboardList(filtered);
}

/* ---------------- EDIT POST LOGIC ---------------- */
function editPost(id) {
  const room = myPostsData.find(p => p.id === id);
  if (!room) return;

  currentEditingPostId = room.id;
  currentEditingImages = room.images || "";

  document.getElementById('title').value = room.title || "";
  document.getElementById('type').value = room.type || "";
  document.getElementById('rent').value = room.rent || "";
  document.getElementById('deposit').value = room.deposit || "";
  document.getElementById('loc').value = room.location || "";
  document.getElementById('description').value = room.description || "";
  document.getElementById('contact').value = room.contact_number || "";
  document.getElementById('whatsapp').value = room.whatsapp_number || "";
  document.getElementById('show_contact').value = room.show_contact === false ? "false" : "true";
  document.getElementById('show_whatsapp').value = room.show_whatsapp === false ? "false" : "true";
  document.getElementById('brokerage_type').value = room.brokerage_type || "No Brokerage";
  document.getElementById('brokerage_amount').value = room.brokerage_amount || "";
  document.getElementById('images').value = ""; 
  
  lat = room.latitude;
  lng = room.longitude;
  
  toggleBrokerage();

  pageTitle.innerText = "Edit Property";
  submitBtn.innerHTML = "Update Property";
  
  showForm(true, true);
}

function clearForm() {
  currentEditingPostId = null;
  currentEditingImages = "";
  
  document.getElementById('title').value = "";
  document.getElementById('type').value = "";
  document.getElementById('rent').value = "";
  document.getElementById('deposit').value = "";
  document.getElementById('loc').value = "";
  document.getElementById('description').value = "";
  document.getElementById('contact').value = "";
  document.getElementById('whatsapp').value = "";
  document.getElementById('show_contact').value = "true";
  document.getElementById('show_whatsapp').value = "true";
  document.getElementById('brokerage_type').value = "No Brokerage";
  document.getElementById('brokerage_amount').value = "";
  document.getElementById('images').value = "";
  
  lat = null;
  lng = null;
  if(marker && map) map.removeLayer(marker);
  
  toggleBrokerage();
  pageTitle.innerText = "Post Property";
  submitBtn.innerHTML = "Submit Property";
}

/* ---------------- MAP & GEOCODING ---------------- */
function initMap() {
  map = L.map('map').setView([18.52, 73.85], 12); 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on("click", async (e) => {
    lat = e.latlng.lat;
    lng = e.latlng.lng;
    setMarker(lat, lng);
    await reverseGeocode(lat, lng);
  });
}

function setMarker(lt, lg) {
  if (marker) map.removeLayer(marker);
  marker = L.marker([lt, lg]).addTo(map);
}

function detectLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      map.setView([lat,lng], 15);
      setMarker(lat, lng);
      await reverseGeocode(lat, lng);
    });
  } else {
    alert("Geolocation is not supported by this browser.");
  }
}

async function reverseGeocode(lat, lon) {
  try {
    locInput.value = "Fetching address...";
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data = await res.json();
    if(data && data.display_name) { locInput.value = data.display_name; } 
    else { locInput.value = ""; }
  } catch (err) {
    console.error(err);
    locInput.value = "";
  }
}

let locTimeout;
locInput.addEventListener('input', (e) => {
  clearTimeout(locTimeout);
  const val = e.target.value.trim();
  if(val.length < 3) { suggestionsBox.classList.add("hidden"); return; }
  locTimeout = setTimeout(() => fetchSuggestions(val), 600);
});

async function fetchSuggestions(query) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=in&limit=5`);
    const data = await res.json();
    
    suggestionsBox.innerHTML = "";
    if (data.length === 0) { suggestionsBox.classList.add("hidden"); return; }

    data.forEach(place => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerText = place.display_name;
      div.onclick = () => {
        locInput.value = place.display_name;
        lat = parseFloat(place.lat);
        lng = parseFloat(place.lon);
        setMarker(lat, lng);
        map.setView([lat, lng], 15);
        suggestionsBox.classList.add("hidden");
      };
      suggestionsBox.appendChild(div);
    });
    suggestionsBox.classList.remove("hidden");
  } catch(e) { console.error(e); }
}

document.addEventListener('click', (e) => {
  if (!locInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
    suggestionsBox.classList.add("hidden");
  }
});

/* ---------------- FORM & SUBMIT LOGIC ---------------- */
function toggleBrokerage() {
  const type = document.getElementById('brokerage_type').value;
  const wrapper = document.getElementById('brokerageAmtWrapper');
  if (type === "Applicable" || type === "Negotiable") {
    wrapper.classList.remove("hidden");
  } else {
    wrapper.classList.add("hidden");
    document.getElementById('brokerage_amount').value = "";
  }
}

function getFormData() {
  return {
    title: document.getElementById('title').value,
    type: document.getElementById('type').value,
    rent: document.getElementById('rent').value,
    deposit: document.getElementById('deposit').value,
    location: document.getElementById('loc').value,
    description: document.getElementById('description').value,
    contact: document.getElementById('contact').value,
    whatsapp: document.getElementById('whatsapp').value,
    show_contact: document.getElementById('show_contact').value,
    show_whatsapp: document.getElementById('show_whatsapp').value,
    brokerage_type: document.getElementById('brokerage_type').value,
    brokerage_amount: document.getElementById('brokerage_amount').value,
    lat, lng
  };
}

async function uploadImages(files) {
  let urls = [];
  for (let file of files) {
    const formData = new FormData();
    formData.append("image", file);
    try {
      const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
      const result = await response.json();
      if (result.success) urls.push(result.data.url);
    } catch (error) { console.error("Error uploading to ImgBB:", error); }
  }
  return urls.join(",");
}

async function submitPost() {
  if (!currentUser) {
    alert("Please log in or create an account to publish this property.");
    window.location.href = "user.html?redirect=postroom.html";
    return;
  }

  // --- NEW VALIDATION LOGIC ---
  const dataForm = getFormData();
  let missingFields = [];

  if (!dataForm.title.trim()) missingFields.push("Title");
  if (!dataForm.type) missingFields.push("Property Type");
  if (!dataForm.rent) missingFields.push("Rent Amount");
  if (!dataForm.location.trim()) missingFields.push("Location");
  if (!dataForm.description.trim()) missingFields.push("Description");
  if (!dataForm.contact.trim()) missingFields.push("Contact Number");

  // Dynamic check for brokerage amount
  if ((dataForm.brokerage_type === "Applicable" || dataForm.brokerage_type === "Negotiable") && !dataForm.brokerage_amount) {
    missingFields.push("Brokerage Amount");
  }

  // If there are missing fields, stop submission and alert the user
  if (missingFields.length > 0) {
    alert("Please fill in the following required fields before submitting:\n\n• " + missingFields.join("\n• "));
    return; // Exit the function early
  }
  // ----------------------------

  const isUpdating = currentEditingPostId !== null;
  submitBtn.innerHTML = `<span class="material-symbols-rounded" style="animation: spin 1s linear infinite;">sync</span> ${isUpdating ? 'Updating...' : 'Uploading...'}`;
  submitBtn.disabled = true;

  try {
    const imagesFiles = document.getElementById("images").files;
    let finalImageUrls = currentEditingImages; 

    if (imagesFiles.length > 0) {
      finalImageUrls = await uploadImages(imagesFiles); 
    }
    
    const payload = {
      title: dataForm.title,
      type: dataForm.type,
      rent: dataForm.rent || null,
      deposit: dataForm.deposit || null,
      location: dataForm.location,
      latitude: dataForm.lat,
      longitude: dataForm.lng,
      description: dataForm.description,
      images: finalImageUrls,
      contact_number: dataForm.contact,
      show_contact: dataForm.show_contact === "true",
      whatsapp_number: dataForm.whatsapp,
      show_whatsapp: dataForm.show_whatsapp === "true",
      brokerage_type: dataForm.brokerage_type,
      brokerage_amount: dataForm.brokerage_amount || null,
      status: "new", 
      updated_at: new Date().toISOString() 
    };

    if (isUpdating) {
      const { error } = await db.from("room_posts").update(payload).eq("id", currentEditingPostId);
      if (error) throw error;
      alert("Property updated and submitted for review!");
    } else {
      payload.user_id = currentUser.id;
      const { error } = await db.from("room_posts").insert(payload);
      if (error) throw error;
      alert("Property submitted successfully! It is currently under review.");
    }

    clearForm();
    showDashboard();

  } catch (err) {
    console.error("Supabase Error:", err);
    alert("Something went wrong. Please try again.");
  } finally {
    submitBtn.innerHTML = currentEditingPostId ? "Update Property" : "Submit Property";
    submitBtn.disabled = false;
  }
}

// Spin animation for loading button
const style = document.createElement('style');
style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
document.head.appendChild(style);

</script>
