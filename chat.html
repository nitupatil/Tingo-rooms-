<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chats - TingoRooms</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --whatsapp-green: #25D366;
  --whatsapp-green-dark: #075E54;
  --whatsapp-teal: #128C7E;
  --whatsapp-bg: #EFF2F5;
  --chat-bubble-sent: #DCF8C6;
  --chat-bubble-received: #FFFFFF;
  --surface-white: #FFFFFF;
  --text-primary: #111B21;
  --text-secondary: #667781;
  --text-muted: #8696A0;
  --border-light: #E9EDF0;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --safe-bottom: 90px;
}

body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
  background: #EFF2F5;
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  height: 100%;
  overflow: hidden;
}

html, body {
  height: 100%;
  width: 100%;
}

.app-container {
  max-width: 480px;
  margin: 0 auto;
  background: var(--whatsapp-bg);
  height: 100%;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ----- HEADER (WhatsApp Style) ----- */
.header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--surface-white);
  border-bottom: 1px solid var(--border-light);
  position: relative;
  z-index: 10;
  min-height: 64px;
}

.back-btn {
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  transition: background 0.2s;
  margin-right: 8px;
  color: var(--whatsapp-green-dark);
}

.back-btn:active { background: #F0F2F4; }

.header-title {
  flex: 1;
  font-weight: 600;
  font-size: 18px;
  line-height: 1.3;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.chat-header-name {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.chat-header-name span:first-child {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
}

.role-badge-mini {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
  background: #EFF2F5;
  color: var(--whatsapp-teal);
}

.room-subtitle {
  font-size: 13px;
  color: var(--whatsapp-green-dark);
  font-weight: 500;
  margin-top: 2px;
  letter-spacing: -0.2px;
}

/* ----- SEARCH BAR (Modern) ----- */
.search-wrapper {
  padding: 12px 16px;
  background: var(--surface-white);
  border-bottom: 1px solid var(--border-light);
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 12px 16px 12px 46px;
  border-radius: 30px;
  border: none;
  background: #F0F2F4;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s;
}

.search-box input::placeholder { color: var(--text-muted); font-weight: 400; }

.search-box input:focus {
  background: var(--surface-white);
  box-shadow: 0 0 0 2px var(--whatsapp-green);
}

.search-box .material-symbols-rounded {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 20px;
  pointer-events: none;
}

/* ----- CHAT LIST (Modern WhatsApp Layout) ----- */
.chat-list-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  background: var(--surface-white);
  padding-bottom: calc(var(--safe-bottom) + 12px);
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.2s;
  border-bottom: 1px solid var(--border-light);
  background: var(--surface-white);
}

.chat-item:active { background: #F5F6F8; }
.chat-item.inactive { opacity: 0.7; background: #FAFAFC; }
.highlight-chat { background: #F0F8FF; }

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 14px;
  border: 1px solid rgba(0,0,0,0.05);
  background: #EFF2F5;
}

.chat-info-wrapper {
  flex: 1;
  overflow: hidden;
}

.chat-header-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.chat-name {
  font-weight: 600;
  font-size: 16px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.chat-time {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  white-space: nowrap;
  margin-left: 8px;
}

.chat-room-title {
  font-size: 12px;
  color: var(--whatsapp-teal);
  font-weight: 500;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.chat-footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.chat-preview {
  font-size: 14px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.unread-badge {
  background: var(--whatsapp-green);
  color: white;
  font-size: 11px;
  font-weight: 700;
  border-radius: 20px;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #FFE9E6;
  color: #D14532;
}

.role-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #EFF2F5;
  color: var(--whatsapp-teal);
}
.role-badge.owner { background: #E9F6EF; color: #2A7A4B; }
.role-badge.seeker { background: #E9F0FE; color: #1E6FDF; }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 500;
}

/* ----- ACTIVE CHAT VIEW (Modern Chat Bubble UI) ----- */
.chat-box-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  background-color: #EFF2F5;
  background-image: radial-gradient(circle at 10% 30%, rgba(210, 220, 230, 0.2) 2%, transparent 2.5%);
  background-size: 28px 28px;
}

.message {
  max-width: 80%;
  padding: 10px 14px;
  margin-bottom: 8px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.45;
  word-wrap: break-word;
  position: relative;
  width: fit-content;
  box-shadow: var(--shadow-sm);
}

.sent {
  background: var(--chat-bubble-sent);
  color: var(--text-primary);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

.received {
  background: var(--surface-white);
  color: var(--text-primary);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  box-shadow: 0 1px 1px rgba(0,0,0,0.05);
}

.message span:first-child {
  display: block;
}

.message-time {
  font-size: 9px;
  color: #8696A0;
  align-self: flex-end;
  margin-top: 4px;
  letter-spacing: 0.2px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.sent .message-time {
  color: rgba(0,0,0,0.45);
}

/* TYPING INDICATOR */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  background: var(--surface-white);
  border-radius: 18px;
  width: fit-content;
  border-bottom-left-radius: 6px;
  box-shadow: var(--shadow-sm);
}

.typing-dot {
  width: 7px;
  height: 7px;
  background-color: #8696A0;
  border-radius: 50%;
  animation: typingBounce 1.4s infinite ease-in-out both;
}

.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* INPUT AREA (WhatsApp Style) */
.input-area {
  background: var(--surface-white);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid var(--border-light);
  backdrop-filter: blur(4px);
}

.input-area input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 30px;
  border: none;
  background: #F0F2F4;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

.input-area input:focus {
  background: var(--surface-white);
  box-shadow: 0 0 0 2px var(--whatsapp-green);
}

.send-btn {
  background: var(--whatsapp-green);
  color: white;
  border: none;
  border-radius: 50%;
  width: 46px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
  flex-shrink: 0;
  box-shadow: 0 2px 5px rgba(37, 211, 102, 0.3);
}

.send-btn:active { transform: scale(0.92); background: #20B859; }

.inactive-banner {
  background: #FFEFE6;
  color: #C2410C;
  text-align: center;
  padding: 12px;
  font-size: 13px;
  font-weight: 500;
  border-top: 1px solid #FFD7C5;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* BOTTOM NAVIGATION */
.bottom-nav {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-around;
  padding: 8px 10px 22px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
  border-top: 1px solid rgba(0,0,0,0.05);
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #8696A0;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  transition: all 0.2s;
}

.nav-item.active { color: var(--whatsapp-green-dark); }

.nav-item .icon-wrapper {
  padding: 6px 12px;
  border-radius: 24px;
  transition: all 0.2s;
}

.nav-item.active .icon-wrapper { background: #E9F6EF; }

.nav-item .material-symbols-rounded { font-size: 24px; }

.nav-item.post-btn .material-symbols-rounded {
  background: var(--whatsapp-green);
  color: white;
  padding: 12px;
  border-radius: 50%;
  margin-top: -32px;
  box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
  font-size: 28px;
  border: 4px solid var(--whatsapp-bg);
  transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.nav-item.post-btn:active .material-symbols-rounded {
  transform: scale(0.92);
}

.hidden { display: none !important; }

/* custom scrollbar */
.chat-list-container::-webkit-scrollbar, .chat-box-container::-webkit-scrollbar {
  width: 5px;
}
.chat-list-container::-webkit-scrollbar-track {
  background: transparent;
}
.chat-list-container::-webkit-scrollbar-thumb {
  background: #CBD5E1;
  border-radius: 10px;
}
</style>
</head>
<body>

<div class="app-container" id="appContainer">
  <div class="header">
    <div class="back-btn hidden" id="backBtn" onclick="goBack()">
      <span class="material-symbols-rounded">arrow_back_ios_new</span>
    </div>
    <div class="header-title" id="headerTitle">Messages</div>
  </div>

  <div class="search-wrapper" id="searchWrapper">
    <div class="search-box">
      <span class="material-symbols-rounded">search</span>
      <input id="searchInput" placeholder="Search chats..." oninput="filterChats()">
    </div>
  </div>

  <div id="chatListView" class="chat-list-container">
    <div class="empty-state">Loading conversations...</div>
  </div>

  <div id="activeChatView" class="chat-box-container hidden"></div>

  <div class="input-area hidden" id="inputArea">
    <input id="msgInput" placeholder="Type a message" onkeypress="handleKeyPress(event)">
    <button class="send-btn" onclick="sendMessage()">
      <span class="material-symbols-rounded" style="font-size: 22px;">send</span>
    </button>
  </div>

  <div class="inactive-banner hidden" id="inactiveBanner">
    <span class="material-symbols-rounded" style="font-size: 18px;">info</span>
    This room is inactive • read-only mode
  </div>

  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item" onclick="go('index.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">home</span></div>
      <span>Home</span>
    </div>
    <div class="nav-item active" onclick="go(window.location.pathname)">
      <div class="icon-wrapper"><span class="material-symbols-rounded">chat_bubble</span></div>
      <span>Chat</span>
    </div>
    <div class="nav-item post-btn" onclick="go('postroom.html')">
      <span class="material-symbols-rounded">add</span>
      <span>Post</span>
    </div>
    <div class="nav-item" onclick="go('map.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">map</span></div>
      <span>Map</span>
    </div>
    <div class="nav-item" onclick="go('user.html')">
      <div class="icon-wrapper"><span class="material-symbols-rounded">person</span></div>
      <span>Profile</span>
    </div>
  </div>
</div>

<script>
// Keyboard & viewport fix
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const container = document.getElementById('appContainer');
    container.style.height = window.visualViewport.height + 'px';
    const chatView = document.getElementById("activeChatView");
    if (!chatView.classList.contains("hidden")) chatView.scrollTop = chatView.scrollHeight;
  });
}

const SUPABASE_URL = "https://slhbrakvprrxtqzodcyy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsaGJyYWt2cHJyeHRxem9kY3l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5Mzk4NzksImV4cCI6MjA5MTUxNTg3OX0.zygNCH4m_Zoz0ybgoyhlQKySHkV_uuFHAEhzqG5WRZ0";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const currentUser = JSON.parse(localStorage.getItem("user"));
if (!currentUser) window.location.href = "user.html";

// DOM elements
const chatListView = document.getElementById("chatListView");
const activeChatView = document.getElementById("activeChatView");
const inputArea = document.getElementById("inputArea");
const inactiveBanner = document.getElementById("inactiveBanner");
const searchWrapper = document.getElementById("searchWrapper");
const bottomNav = document.getElementById("bottomNav");
const backBtn = document.getElementById("backBtn");
const headerTitle = document.getElementById("headerTitle");
const msgInput = document.getElementById("msgInput");

let allChats = [];
let chatInterval;
let chatChannel = null;
let isTyping = false;
let typingTimeout = null;
let isOtherUserTyping = false;
let cachedMessagesHTML = "";

const params = new URLSearchParams(window.location.search);
const chatUserId = params.get("user");
const roomId = params.get("room");

// launch
if (chatUserId && roomId) {
  openChat(chatUserId, roomId);
} else {
  loadChats();
}

function formatTime(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatTimeShort(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function loadChats() {
  const cacheKey = `tingo_chats_${currentUser.id}`;
  const cachedChats = localStorage.getItem(cacheKey);
  if (cachedChats) {
    try {
      allChats = JSON.parse(cachedChats);
      renderChats(allChats);
    } catch(e) {}
  }

  const { data, error } = await db
    .from("messages")
    .select("*")
    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
    .order("created_at", { ascending: false });

  if (error || !data || data.length === 0) {
    if (!cachedChats) chatListView.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded" style="font-size: 48px; opacity: 0.5;">chat</span><p style="margin-top: 12px;">No messages yet</p></div>`;
    return;
  }

  const map = {};
  for (let msg of data) {
    const otherId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
    const key = otherId + "_" + msg.room_id;
    if (!map[key]) {
      map[key] = {
        otherId: otherId,
        roomId: msg.room_id,
        last: msg.message,
        is_read: msg.is_read,
        last_sender_id: msg.sender_id,
        created_at: msg.created_at,
        unread_count: 0
      };
    }
    if (!msg.is_read && msg.receiver_id === currentUser.id) map[key].unread_count++;
  }

  for (let key of Object.keys(map)) {
    let chat = map[key];
    try {
      const { data: user } = await db.from("users").select("*").eq("id", chat.otherId).single();
      const { data: room } = await db.from("room_posts").select("*").eq("id", chat.roomId).single();
      if (user && room) {
        chat.user = user;
        chat.room = room;
      } else delete map[key];
    } catch(err) { delete map[key]; }
  }

  allChats = Object.values(map);
  allChats.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  localStorage.setItem(cacheKey, JSON.stringify(allChats));
  renderChats(allChats);
}

function renderChats(list) {
  if (!list.length) {
    chatListView.innerHTML = `<div class="empty-state">No matching chats</div>`;
    return;
  }
  let html = "";
  list.forEach(c => {
    const avatarUrl = (c.user && c.user.avatar_url) ? c.user.avatar_url : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    const isActive = c.room.status === "active";
    const inactiveClass = isActive ? "" : "inactive";
    const inactiveBadge = isActive ? "" : `<span class="status-badge">Inactive</span>`;
    let roleBadge = c.user.id === c.room.user_id ? `<span class="role-badge owner">Owner</span>` : `<span class="role-badge seeker">Seeker</span>`;
    const hasUnread = c.unread_count > 0;
    const unreadStyle = hasUnread ? "font-weight: 600; color: var(--text-primary);" : "";
    const timeStyle = hasUnread ? "color: var(--whatsapp-green-dark); font-weight: 600;" : "";
    const highlightClass = hasUnread ? "highlight-chat" : "";
    const badgeHtml = hasUnread ? `<div class="unread-badge">${c.unread_count}</div>` : "";
    const timeStr = formatTime(c.created_at);

    html += `
      <div class="chat-item ${inactiveClass} ${highlightClass}" onclick="goToChat('${c.user.id}','${c.room.id}')">
        <img class="avatar" src="${avatarUrl}" alt="${c.user.name}">
        <div class="chat-info-wrapper">
          <div class="chat-header-row">
            <div class="chat-name">${escapeHtml(c.user.name)} ${roleBadge}</div>
            <div class="chat-time" style="${timeStyle}">${timeStr}</div>
          </div>
          <div class="chat-room-title">${escapeHtml(c.room.title)} ${inactiveBadge}</div>
          <div class="chat-footer-row">
            <div class="chat-preview" style="${unreadStyle}">${escapeHtml(c.last)}</div>
            ${badgeHtml}
          </div>
        </div>
      </div>`;
  });
  chatListView.innerHTML = html;
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

function filterChats() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allChats.filter(c => (c.user && c.user.name.toLowerCase().includes(q)) || (c.room && c.room.title.toLowerCase().includes(q)));
  renderChats(filtered);
}

async function openChat(userId, roomToLoadId) {
  chatListView.classList.add("hidden");
  searchWrapper.classList.add("hidden");
  bottomNav.classList.add("hidden");
  activeChatView.classList.remove("hidden");
  backBtn.classList.remove("hidden");

  const { data: user } = await db.from("users").select("*").eq("id", userId).single();
  const { data: room } = await db.from("room_posts").select("*").eq("id", roomToLoadId).single();
  const roleBadge = (user.id === room.user_id) ? `<span class="role-badge-mini owner">Owner</span>` : `<span class="role-badge-mini">Seeker</span>`;
  headerTitle.innerHTML = `<div class="chat-header-name"><span>${escapeHtml(user.name)}</span> ${roleBadge}</div><div class="room-subtitle">${escapeHtml(room.title)}</div>`;

  if (room && room.status === "active") {
    inputArea.classList.remove("hidden");
    inactiveBanner.classList.add("hidden");
  } else {
    inputArea.classList.add("hidden");
    inactiveBanner.classList.remove("hidden");
  }

  if (chatChannel) db.removeChannel(chatChannel);
  const channelStr = `typing_room_${roomToLoadId}_${[currentUser.id, userId].sort().join('_')}`;
  chatChannel = db.channel(channelStr);
  chatChannel.on('broadcast', { event: 'typing' }, (payload) => {
    if (payload.payload.user_id === userId) {
      isOtherUserTyping = payload.payload.is_typing;
      renderActiveChatUI();
    }
  }).subscribe();

  loadMessages(userId, roomToLoadId);
  if (chatInterval) clearInterval(chatInterval);
  chatInterval = setInterval(() => loadMessages(userId, roomToLoadId, false), 3000);
}

msgInput.addEventListener('input', () => {
  if (!chatChannel) return;
  if (!isTyping) {
    isTyping = true;
    chatChannel.send({ type: 'broadcast', event: 'typing', payload: { user_id: currentUser.id, is_typing: true } });
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    chatChannel.send({ type: 'broadcast', event: 'typing', payload: { user_id: currentUser.id, is_typing: false } });
  }, 1500);
});

async function loadMessages(userId, roomToLoadId, forceScroll = true) {
  const cacheKey = `tingo_msgs_${roomToLoadId}_${userId}_${currentUser.id}`;
  if (forceScroll) {
    const cached = localStorage.getItem(cacheKey);
    if (cached) { cachedMessagesHTML = cached; renderActiveChatUI(true); }
  }

  const { data } = await db.from("messages").select("*").eq("room_id", roomToLoadId)
    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${userId}),and(sender_id.eq.${userId},receiver_id.eq.${currentUser.id})`)
    .order("created_at", { ascending: true });
  if (!data) return;

  const unread = data.filter(m => m.receiver_id === currentUser.id && !m.is_read);
  if (unread.length) {
    await db.from("messages").update({ is_read: true }).eq("receiver_id", currentUser.id).eq("sender_id", userId).eq("room_id", roomToLoadId);
  }

  let html = "";
  data.forEach(msg => {
    const isSent = msg.sender_id === currentUser.id;
    const timeStr = formatTimeShort(msg.created_at);
    html += `<div class="message ${isSent ? 'sent' : 'received'}">
      <span>${escapeHtml(msg.message)}</span>
      <div class="message-time">${timeStr}</div>
    </div>`;
  });
  cachedMessagesHTML = html;
  localStorage.setItem(cacheKey, html);
  renderActiveChatUI(forceScroll);
}

function renderActiveChatUI(forceScroll = false) {
  let finalHTML = cachedMessagesHTML;
  if (isOtherUserTyping) {
    finalHTML += `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  }
  const wasAtBottom = (activeChatView.scrollHeight - activeChatView.scrollTop) <= (activeChatView.clientHeight + 60);
  if (activeChatView.innerHTML !== finalHTML) {
    activeChatView.innerHTML = finalHTML;
    if (forceScroll || wasAtBottom) activeChatView.scrollTop = activeChatView.scrollHeight;
  } else if (forceScroll) activeChatView.scrollTop = activeChatView.scrollHeight;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  isTyping = false;
  clearTimeout(typingTimeout);
  if (chatChannel) chatChannel.send({ type: 'broadcast', event: 'typing', payload: { user_id: currentUser.id, is_typing: false } });
  const { data: existing } = await db.from("messages").select("id").eq("room_id", roomId).limit(1);
  const isFirst = !existing || existing.length === 0;
  msgInput.value = "";
  await db.from("messages").insert({ sender_id: currentUser.id, receiver_id: chatUserId, room_id: roomId, message: text, is_read: false, is_first_message: isFirst });
  loadMessages(chatUserId, roomId, true);
  msgInput.focus();
}

function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
function goToChat(user, room) { window.location.href = window.location.pathname + `?user=${user}&room=${room}`; }
function openRoom(id) { window.location.href = `roomdetails.html?id=${id}`; }
function goBack() {
  clearInterval(chatInterval);
  if (chatChannel) db.removeChannel(chatChannel);
  const source = params.get("source"), roomIdParam = params.get("room");
  if (source === "index" && roomIdParam) window.location.replace(`roomdetails.html?id=${roomIdParam}`);
  else if (source === "roomdetails") history.back();
  else window.location.replace(window.location.pathname);
}
function go(page) { window.location.href = page; }
</script>
</body>
